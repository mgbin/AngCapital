{% extends "base.html" %}

{% block content %}
<section class="admin-panel">
    <div class="admin-toolbar">
        <div class="section-heading">
            <span class="eyebrow">Publish Report</span>
            <h1>新增研报</h1>
        </div>
        <a class="button button-secondary" href="/admin/reports">返回列表</a>
    </div>
    <form class="form-card large" method="post" action="/admin/reports/new" enctype="multipart/form-data">
        <div class="form-grid">
            <label>
                <span>标题</span>
                <input type="text" name="title" required>
            </label>
            <label>
                <span>标签</span>
                <input type="text" name="category" value="AI Strategy, Semiconductor" placeholder="例如：AI Strategy, Semiconductor, Macro" required>
            </label>
            <label>
                <span>发布日期</span>
                <input type="date" name="publish_date" value="{{ today }}" required>
            </label>
            <label>
                <span>研报状态</span>
                <select name="status" required>
                    <option value="draft">草稿</option>
                    <option value="published">已发布</option>
                </select>
            </label>
            <label>
                <span>上传 PDF</span>
                <input type="file" name="pdf_file" accept="application/pdf,.pdf" required>
            </label>
        </div>
        <label>
            <span>摘要</span>
            <textarea name="summary" rows="4" required placeholder="用于列表页和详情页顶部的简短摘要"></textarea>
        </label>
        <div class="form-actions">
            <button class="button button-primary" type="submit">发布研报</button>
        </div>
    </form>
</section>
{% endblock %}
