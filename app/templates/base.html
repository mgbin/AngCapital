<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | {{ settings.app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/site.css') }}">
</head>
<body>
    <div class="shell">
        <header class="site-header">
            <a class="brand" href="{% if nav_mode == 'admin' %}/admin/reports{% else %}/{% endif %}" aria-label="Ang Capital Home">
                <img src="{{ url_for('static', path='/images/logo.png') }}" alt="Ang Capital" class="brand-logo">
                <span class="brand-title">{{ settings.app_name }}</span>
            </a>
            <nav>
                {% if nav_mode == "admin" %}
                <a href="/admin/reports">研报列表</a>
                <a href="/admin/reports/new">新增研报</a>
                <a href="/admin/users">用户管理</a>
                <form method="post" action="/admin/logout" class="nav-inline-form">
                    <button type="submit" class="nav-link-button">退出后台</button>
                </form>
                {% elif nav_mode == "admin_auth" %}
                <a href="/admin/login" class="nav-login-link">后台登录</a>
                {% else %}
                <a href="/">首页</a>
                <a href="/contact">联系我们</a>
                {% if frontend_user %}
                <a href="/me" class="nav-login-link">{{ frontend_user.username }}</a>
                {% else %}
                <a href="/login" class="nav-login-link">登录</a>
                {% endif %}
                <form method="get" action="/" class="nav-search-form">
                    <input
                        type="search"
                        name="q"
                        value="{{ search_query or '' }}"
                        placeholder="搜索标题或摘要"
                        class="nav-search-input"
                    >
                </form>
                {% endif %}
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer class="site-footer">
            <a href="https://www.ang-capital.com" target="_blank" rel="noopener noreferrer">
                Copyright © Ang Capital
            </a>
        </footer>
    </div>
</body>
</html>
